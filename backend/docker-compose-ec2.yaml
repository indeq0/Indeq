services:
  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: rabbitmq
    env_file:
      - /home/ec2-user/common/config/.env
    ports:
      - 5672:5672 # AMQP protocol port
      - 15672:15672 # Management UI port
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - indeq-net

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    env_file:
      - /home/ec2-user/common/config/.env
    networks:
      - indeq-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  init:
    image: initImage
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
      couchdb:
        condition: service_healthy
    networks:
      - indeq-net

  embedding:
    image: embeddingImage
    volumes:
      - embedding_data:/app/model_cache
    networks:
      - indeq-net

  mqtt:
    image: mqttImage
    container_name: mqtt-service
    ports:
      - "8883:8883"
    build:
      context: .
      dockerfile: mqtt/Dockerfile
    networks:
      - indeq-net

  authentication:
    image: authImage
    env_file:
      - /home/ec2-user/common/config/.env
    depends_on:
      appDB:
        condition: service_healthy
      vector:
        condition: service_started
    networks:
      - indeq-net

  retrieval:
    image: retrievalImage
    depends_on:
      desktop:
        condition: service_started
      crawling:
        condition: service_started
      vector:
        condition: service_started
    networks:
      - indeq-net

  vector:
    image: vectorImage
    build:
      context: .
      dockerfile: vector/Dockerfile
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - indeq-net

  gateway:
    image: gatewayImage
    env_file:
      - /home/ec2-user/common/config/.env
    ports:
      - "8080:8080"
    depends_on:
      query:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      authentication:
        condition: service_started
      desktop:
        condition: service_started
      init:
        condition: service_completed_successfully
    networks:
      - indeq-net

  desktop:
    image: desktopImage
    ports:
      - "8081:8080"
    depends_on:
      init:
        condition: service_completed_successfully
      mqtt:
        condition: service_started
    networks:
      - indeq-net

  query:
    image: queryImage
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - indeq-net

  crawling:
    image: crawlingImage
    env_file:
      - /home/ec2-user/common/config/.env
    depends_on:
      init:
        condition: service_completed_successfully
      appDB:
        condition: service_healthy
    networks:
      - indeq-net

  integration:
    image: integrationImage
    env_file: /home/ec2-user/common/config/.env
    depends_on:
      appDB:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - indeq-net

  redis:
    image: redis:alpine
    env_file:
      - /home/ec2-user/common/config/.env
    command: ["sh", "-c", 'exec redis-server --requirepass "$$REDIS_PASSWORD"']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - indeq-net

  appDB:
    image: postgres:latest
    env_file:
      - /home/ec2-user/common/config/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    command:
      - -c
      - ssl=off
    expose:
      - "5432"
    volumes:
      - app_data:/var/lib/postgresql/data
    networks:
      - indeq-net
  
  couchdb:
    image: couchdb
    env_file:
      - /home/ec2-user/common/config/.env
    restart: always
    volumes:
      - couch_data:/opt/couchdb/data
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:5984 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - indeq-net

volumes:
  app_data:
  embedding_data:
  redis_data:
  couch_data:

networks:
  indeq-net:
    driver: bridge
    labels:
      com.docker.network.dns.name: docker.internal
